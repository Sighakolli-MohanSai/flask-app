version: "3.9"

services:

  app:
    build: .
    container_name: movie-theatre-app

    ports:
      - "5000:5000"

    depends_on:
      - db

    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: movie_db

  db:
    build: ./database

    container_name: movie-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: movie_db

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: