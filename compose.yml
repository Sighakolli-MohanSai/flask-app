version: "3.8"

services:

  db:
    image: mohansai05/flaskapp:db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: flaskdb
      MYSQL_USER: flaskuser
      MYSQL_PASSWORD: flaskpass

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

    volumes:
      - db-data:/var/lib/mysql

    networks:
      - app-network

  app:
    image: mohansai05/flaskapp:app

    ports:
      - "5000:5000"

    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

    depends_on:
      - db

    networks:
      - app-network

networks:
  app-network:
    driver: overlay

volumes:
  db-data:
