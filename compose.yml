version: "3.8"

services:

  db:
    image: mohansai05/flaskapp:db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: movie_db
      MYSQL_USER: flaskuser
      MYSQL_PASSWORD: flaskpass

    volumes:
      - db-data:/var/lib/mysql

    deploy:
      replicas: 1

    networks:
      - app-network

  app:
    image: mohansai05/flaskapp:app

    ports:
      - "5000:5000"

    environment:
      DB_HOST: db
      DB_USER: flaskuser
      DB_PASSWORD: flaskpass
      DB_NAME: movie_db

    deploy:
      replicas: 3

    depends_on:
      - db

    networks:
      - app-network

networks:
  app-network:
    driver: overlay

volumes:
  db-data:
